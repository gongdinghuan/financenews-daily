<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stocks News - FinanceNews Daily</title>
  <meta name="description" content="Latest stock market news, analysis and updates">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    .loading-spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .last-updated { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 16px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">FinanceNews Daily</a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/stocks/">Stocks</a>
        <a href="/forex/">Forex</a>
        <a href="/crypto/">Crypto</a>
        <a href="/economy/">Economy</a>
        <a href="/about/">About</a>
        <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="content">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="/"><span>Home</span></a></li>
          <li><span aria-current="page">Stocks</span></li>
        </ol>
      </nav>

      <h1>Stocks News</h1>
      <p>Latest updates from the stock market</p>

      <div class="last-updated" id="lastUpdated">Last updated: --</div>

      <div id="loading" class="loading" style="display: none;">
        <span class="loading-spinner"></span>
        <p>Loading stocks news...</p>
      </div>

      <div id="newsGrid" class="news-grid"></div>
    </div>

    <aside class="sidebar">
      <div class="trending">
        <h3>Trending Stocks</h3>
        <ul id="trendingList"></ul>
      </div>
    </aside>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 FinanceNews Daily. All rights reserved.</p>
      <div class="footer-nav">
        <a href="/about/">About</a>
        <a href="/feed.xml">RSS Feed</a>
      </div>
    </div>
  </footer>

  <script>
    const CATEGORY = 'stocks';
    let newsData = [];

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function truncate(str, length) {
      if (!str) return '';
      if (str.length <= length) return str;
      return str.substring(0, length).trim() + '...';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderNews(news) {
      const grid = document.getElementById('newsGrid');
      const stocksNews = news.filter(n => n.category === CATEGORY);

      if (stocksNews.length === 0) {
        grid.innerHTML = '<p class="loading">No stocks news available.</p>';
        return;
      }

      grid.innerHTML = stocksNews.map(item => `
        <article class="news-card">
          <div class="news-card-content">
            <span class="category-badge ${item.category}">${item.category}</span>
            <div class="news-card-meta">${escapeHtml(item.source)} | ${formatDate(item.pubDate)}</div>
            <h2><a href="/news/${item.slug}/">${escapeHtml(item.title)}</a></h2>
            <p>${escapeHtml(truncate(item.summary, 150))}</p>
          </div>
        </article>
      `).join('');
    }

    function renderTrending(news) {
      const list = document.getElementById('trendingList');
      const stocksNews = news.filter(n => n.category === CATEGORY).slice(0, 5);
      list.innerHTML = stocksNews.map(item => `
        <li><a href="/news/${item.slug}/">${escapeHtml(truncate(item.title, 50))}</a></li>
      `).join('');
    }

    async function fetchNews() {
      const loading = document.getElementById('loading');
      loading.style.display = 'block';

      try {
        const response = await fetch('/src/_data/news.json?' + Date.now());
        if (!response.ok) throw new Error('Network error');
        newsData = await response.json();
        renderNews(newsData);
        renderTrending(newsData);
        document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
      } catch (error) {
        console.error('Failed to fetch news:', error);
        document.getElementById('newsGrid').innerHTML = '<p class="loading">Failed to load news.</p>';
      } finally {
        loading.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', fetchNews);

    // Dark mode
    (function() {
      const toggle = document.getElementById('darkModeToggle');
      const sunIcon = toggle?.querySelector('.sun-icon');
      const moonIcon = toggle?.querySelector('.moon-icon');
      const saved = localStorage.getItem('darkMode');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'true' || (!saved && systemDark)) {
        document.documentElement.classList.add('dark-mode');
        if (sunIcon) sunIcon.style.display = 'none';
        if (moonIcon) moonIcon.style.display = 'block';
      }
      toggle?.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark-mode');
        const isDark = document.documentElement.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark.toString());
        if (sunIcon) sunIcon.style.display = isDark ? 'none' : 'block';
        if (moonIcon) moonIcon.style.display = isDark ? 'block' : 'none';
      });
    })();
  </script>
</body>
</html>
