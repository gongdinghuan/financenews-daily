<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo Icon -->
  <rect x="80" y="180" width="120" height="120" rx="24" fill="#4fc3f7"/>
  <text x="140" y="265" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#1a1a2e" text-anchor="middle">F</text>

  <!-- Site Name -->
  <text x="240" y="220" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" font-weight="bold">FinanceNews Daily</text>

  <!-- Tagline -->
  <text x="240" y="280" font-family="Arial, sans-serif" font-size="28" fill="#4fc3f7">Your Daily Source for Financial News</text>

  <!-- Categories -->
  <g transform="translate(240, 380)">
    <rect x="0" y="0" width="180" height="50" rx="25" fill="#e3f2fd"/>
    <text x="90" y="32" font-family="Arial, sans-serif" font-size="22" fill="#1565c0" text-anchor="middle" font-weight="600">Stocks</text>

    <rect x="200" y="0" width="160" height="50" rx="25" fill="#e8f5e9"/>
    <text x="280" y="32" font-family="Arial, sans-serif" font-size="22" fill="#2e7d32" text-anchor="middle" font-weight="600">Forex</text>

    <rect x="380" y="0" width="160" height="50" rx="25" fill="#fff3e0"/>
    <text x="460" y="32" font-family="Arial, sans-serif" font-size="22" fill="#ef6c00" text-anchor="middle" font-weight="600">Crypto</text>

    <rect x="560" y="0" width="180" height="50" rx="25" fill="#fce4ec"/>
    <text x="650" y="32" font-family="Arial, sans-serif" font-size="22" fill="#c2185b" text-anchor="middle" font-weight="600">Economy</text>
  </g>

  <!-- Footer Badge -->
  <rect x="80" y="520" width="300" height="60" rx="30" fill="#4fc3f7" opacity="0.2"/>
  <text x="230" y="558" font-family="Arial, sans-serif" font-size="24" fill="#4fc3f7" text-anchor="middle" font-weight="600">Updated Hourly</text>
</svg>
