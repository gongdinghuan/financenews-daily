<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - FinanceNews Daily</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .loading-spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border-color); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .article-not-found { text-align: center; padding: 60px 20px; }
    .article-not-found h1 { font-size: 2rem; margin-bottom: 16px; color: var(--text-primary); }
    .article-not-found p { color: var(--text-secondary); margin-bottom: 24px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">FinanceNews Daily</a>
      <nav class="nav">
        <a href="/">Home</a><a href="/stocks/">Stocks</a><a href="/forex/">Forex</a><a href="/crypto/">Crypto</a><a href="/economy/">Economy</a><a href="/about/">About</a>
        <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="content">
      <div id="loading" class="loading" style="display: none;">
        <span class="loading-spinner"></span>
        <p>Loading article...</p>
      </div>
      <div id="articleContainer"></div>
    </div>
    <aside class="sidebar">
      <div class="trending">
        <h3>Related News</h3>
        <ul id="relatedList"></ul>
      </div>
    </aside>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 FinanceNews Daily.</p>
      <div class="footer-nav">
        <a href="/about/">About</a><a href="/feed.xml">RSS</a>
      </div>
    </div>
  </footer>

  <script>
    // Get slug from URL path
    function getSlugFromUrl() {
      const path = window.location.pathname;
      const parts = path.split('/').filter(p => p);
      // URL pattern: /news/{slug}/ or /news/{slug}/index.html
      if (parts[0] === 'news' && parts[1]) {
        return parts[1];
      }
      return null;
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderBreadcrumb(category, title) {
      return `
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <ol>
            <li><a href="/"><span>Home</span></a></li>
            <li><a href="/${category}/">${escapeHtml(category.charAt(0).toUpperCase() + category.slice(1))}</a></li>
            <li><span aria-current="page">${escapeHtml(title.substring(0, 30))}${title.length > 30 ? '...' : ''}</span></li>
          </ol>
        </nav>
      `;
    }

    function renderArticle(article, allNews) {
      const container = document.getElementById('articleContainer');

      if (!article) {
        container.innerHTML = `
          <div class="article-not-found">
            <h1>Article Not Found</h1>
            <p>The article you're looking for doesn't exist or has been removed.</p>
            <a href="/" class="error-btn primary">Back to Home</a>
          </div>
        `;
        return;
      }

      const relatedNews = allNews
        .filter(n => n.category === article.category && n.slug !== article.slug)
        .slice(0, 3);

      document.title = article.title + ' - FinanceNews Daily';

      container.innerHTML = `
        ${renderBreadcrumb(article.category, article.title)}
        <article class="article">
          <header class="article-header">
            <span class="category-badge ${article.category}">${article.category}</span>
            <h1>${escapeHtml(article.title)}</h1>
            <div class="article-meta">
              Source: <strong>${escapeHtml(article.source)}</strong> | ${formatDate(article.pubDate)}
            </div>
          </header>
          <div class="article-body">
            <p>${escapeHtml(article.summary)}</p>
            <p><em>This is a summary. For the complete article, please visit the original source.</em></p>
            <a href="${escapeHtml(article.link)}" class="read-full" target="_blank" rel="noopener noreferrer nofollow">
              Read Full Article on ${escapeHtml(article.source)} →
            </a>
          </div>
        </article>
      `;

      const relatedList = document.getElementById('relatedList');
      if (relatedNews.length > 0) {
        relatedList.innerHTML = relatedNews.map(item => `
          <li><a href="/news/${item.slug}/">${escapeHtml(item.title.substring(0, 50))}${item.title.length > 50 ? '...' : ''}</a></li>
        `).join('');
      } else {
        relatedList.innerHTML = '<li>No related news available</li>';
      }
    }

    async function fetchArticle() {
      const slug = getSlugFromUrl();
      if (!slug) {
        document.getElementById('articleContainer').innerHTML = '<p class="loading">Invalid article URL</p>';
        return;
      }

      const loading = document.getElementById('loading');
      loading.style.display = 'block';

      try {
        const response = await fetch('/src/_data/news.json?' + Date.now());
        if (!response.ok) throw new Error('Network error');
        const news = await response.json();
        const article = news.find(n => n.slug === slug);
        renderArticle(article, news);
      } catch (error) {
        console.error('Failed to fetch article:', error);
        document.getElementById('articleContainer').innerHTML = '<p class="loading">Failed to load article</p>';
      } finally {
        loading.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', fetchArticle);

    // Dark mode
    (function() {
      const toggle = document.getElementById('darkModeToggle');
      const sunIcon = toggle?.querySelector('.sun-icon');
      const moonIcon = toggle?.querySelector('.moon-icon');
      const saved = localStorage.getItem('darkMode');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'true' || (!saved && systemDark)) {
        document.documentElement.classList.add('dark-mode');
        if (sunIcon) sunIcon.style.display = 'none';
        if (moonIcon) moonIcon.style.display = 'block';
      }
      toggle?.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark-mode');
        const isDark = document.documentElement.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark.toString());
        if (sunIcon) sunIcon.style.display = isDark ? 'none' : 'block';
        if (moonIcon) moonIcon.style.display = isDark ? 'block' : 'none';
      });
    })();
  </script>
</body>
</html>
