<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto News - FinanceNews Daily</title>
  <meta name="description" content="Latest crypto news, Bitcoin updates and blockchain developments">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    .loading-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border-color); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .last-updated { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 16px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">FinanceNews Daily</a>
      <nav class="nav">
        <a href="/">Home</a><a href="/stocks/">Stocks</a><a href="/forex/">Forex</a><a href="/crypto/">Crypto</a><a href="/economy/">Economy</a><a href="/about/">About</a>
        <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </nav>
    </div>
  </header>
  <main class="container">
    <div class="content">
      <nav class="breadcrumb"><ol><li><a href="/"><span>Home</span></a></li><li><span aria-current="page">Crypto</span></li></ol></nav>
      <h1>Cryptocurrency News</h1>
      <p>Bitcoin, Ethereum and altcoin updates</p>
      <div class="last-updated" id="lastUpdated">Last updated: --</div>
      <div id="loading" class="loading" style="display: none;"><span class="loading-spinner"></span><p>Loading crypto news...</p></div>
      <div id="newsGrid" class="news-grid"></div>
    </div>
    <aside class="sidebar"><div class="trending"><h3>Trending Crypto</h3><ul id="trendingList"></ul></div></aside>
  </main>
  <footer class="footer"><div class="footer-container"><p>&copy; 2026 FinanceNews Daily.</p><div class="footer-nav"><a href="/about/">About</a><a href="/feed.xml">RSS</a></div></div></footer>
  <script>
    const CATEGORY = 'crypto';
    function formatDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function truncate(s,l){return s&&s.length>l?s.substring(0,l).trim()+'...':s||'';}
    function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    async function fetchNews(){
      document.getElementById('loading').style.display='block';
      try{
        const r=await fetch('/src/_data/news.json?'+Date.now());
        const news=await r.json();
        const filtered=news.filter(n=>n.category===CATEGORY);
        document.getElementById('newsGrid').innerHTML=filtered.map(i=>`<article class="news-card"><div class="news-card-content"><span class="category-badge ${i.category}">${i.category}</span><div class="news-card-meta">${escapeHtml(i.source)} | ${formatDate(i.pubDate)}</div><h2><a href="/news/${i.slug}/">${escapeHtml(i.title)}</a></h2><p>${escapeHtml(truncate(i.summary,150))}</p></div></article>`).join('');
        document.getElementById('trendingList').innerHTML=filtered.slice(0,5).map(i=>`<li><a href="/news/${i.slug}/">${escapeHtml(truncate(i.title,50))}</a></li>`).join('');
        document.getElementById('lastUpdated').textContent='Last updated: '+new Date().toLocaleTimeString();
      }catch(e){console.error(e);}
      finally{document.getElementById('loading').style.display='none';}
    }
    document.addEventListener('DOMContentLoaded',fetchNews);
    (function(){const t=document.getElementById('darkModeToggle'),s=t?.querySelector('.sun-icon'),m=t?.querySelector('.moon-icon');const saved=localStorage.getItem('darkMode'),sys=window.matchMedia('(prefers-color-scheme:dark)').matches;if(saved==='true'||(!saved&&sys)){document.documentElement.classList.add('dark-mode');if(s)s.style.display='none';if(m)m.style.display='block';}t?.addEventListener('click',()=>{document.documentElement.classList.toggle('dark-mode');const d=document.documentElement.classList.contains('dark-mode');localStorage.setItem('darkMode',d.toString());if(s)s.style.display=d?'none':'block';if(m)m.style.display=d?'block':'none';});})();
  </script>
</body>
</html>
