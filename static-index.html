<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceNews Daily - Real-time Financial News</title>
  <meta name="description" content="Your daily source for stocks, forex, crypto and economy news">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="FinanceNews Daily RSS Feed" href="/feed.xml">
  <style>
    /* Category filter buttons */
    .category-filter {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .category-filter button {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .category-filter button:hover {
      background: var(--bg-secondary);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }
    .category-filter button.active {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
    }
    /* Loading indicator */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Last updated */
    .last-updated {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .last-updated .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">FinanceNews Daily</a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/stocks/">Stocks</a>
        <a href="/forex/">Forex</a>
        <a href="/crypto/">Crypto</a>
        <a href="/economy/">Economy</a>
        <a href="/about/">About</a>
        <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <div class="content">
      <!-- Hero Section -->
      <section class="hero">
        <h1>Today's Financial Headlines</h1>
        <p>Real-time news from top financial sources, updated hourly</p>
      </section>

      <!-- Category Filter -->
      <div class="category-filter">
        <button class="active" data-category="all">All News</button>
        <button data-category="stocks">Stocks</button>
        <button data-category="forex">Forex</button>
        <button data-category="crypto">Crypto</button>
        <button data-category="economy">Economy</button>
      </div>

      <!-- Last Updated -->
      <div class="last-updated">
        <span class="dot"></span>
        <span id="lastUpdated">Last updated: --</span>
        <span id="autoRefresh">(auto-refresh in <span id="countdown">60</span>s)</span>
      </div>

      <!-- Loading Indicator -->
      <div id="loading" class="loading" style="display: none;">
        <span class="loading-spinner"></span>
        <p>Loading latest news...</p>
      </div>

      <!-- News Grid -->
      <div id="newsGrid" class="news-grid"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Trending -->
      <div class="trending">
        <h3>Trending</h3>
        <ul id="trendingList"></ul>
      </div>
    </aside>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 FinanceNews Daily. All rights reserved.</p>
      <div class="footer-nav">
        <a href="/about/">About</a>
        <a href="/feed.xml">RSS Feed</a>
      </div>
    </div>
  </footer>

  <script>
    // State
    let newsData = [];
    let currentCategory = 'all';
    let refreshInterval;
    let countdownInterval;
    const REFRESH_INTERVAL = 60000; // 60 seconds

    // Category badge styles
    const categoryColors = {
      stocks: 'stocks',
      forex: 'forex',
      crypto: 'crypto',
      economy: 'economy'
    };

    // Format date
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Truncate text
    function truncate(str, length) {
      if (!str) return '';
      if (str.length <= length) return str;
      return str.substring(0, length).trim() + '...';
    }

    // Escape HTML
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Render news grid
    function renderNews(news) {
      const grid = document.getElementById('newsGrid');
      const filtered = currentCategory === 'all'
        ? news
        : news.filter(n => n.category === currentCategory);

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="loading">No news available for this category.</p>';
        return;
      }

      grid.innerHTML = filtered.map(item => `
        <article class="news-card">
          <div class="news-card-content">
            <span class="category-badge ${item.category}">${item.category}</span>
            <div class="news-card-meta">${escapeHtml(item.source)} | ${formatDate(item.pubDate)}</div>
            <h3><a href="/news/${item.slug}/">${escapeHtml(item.title)}</a></h3>
            <p>${escapeHtml(truncate(item.summary, 150))}</p>
          </div>
        </article>
      `).join('');
    }

    // Render trending
    function renderTrending(news) {
      const list = document.getElementById('trendingList');
      const top5 = news.slice(0, 5);
      list.innerHTML = top5.map(item => `
        <li><a href="/news/${item.slug}/">${escapeHtml(truncate(item.title, 50))}</a></li>
      `).join('');
    }

    // Fetch news data
    async function fetchNews() {
      const loading = document.getElementById('loading');
      const grid = document.getElementById('newsGrid');

      loading.style.display = 'block';

      try {
        const response = await fetch('/src/_data/news.json?' + Date.now());
        if (!response.ok) throw new Error('Network response was not ok');

        newsData = await response.json();
        renderNews(newsData);
        renderTrending(newsData);

        // Update last updated time
        document.getElementById('lastUpdated').textContent =
          'Last updated: ' + new Date().toLocaleTimeString();

        // Hide grid if showing empty state
        if (newsData.length === 0) {
          grid.innerHTML = '<p class="loading">No news available.</p>';
        }
      } catch (error) {
        console.error('Failed to fetch news:', error);
        if (grid.innerHTML === '') {
          grid.innerHTML = '<p class="loading">Failed to load news. Please refresh the page.</p>';
        }
      } finally {
        loading.style.display = 'none';
      }
    }

    // Reset countdown
    function resetCountdown() {
      let seconds = Math.floor(REFRESH_INTERVAL / 1000);
      const countdownEl = document.getElementById('countdown');

      if (countdownInterval) clearInterval(countdownInterval);

      countdownEl.textContent = seconds;

      countdownInterval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        if (seconds <= 0) {
          seconds = Math.floor(REFRESH_INTERVAL / 1000);
        }
      }, 1000);
    }

    // Setup category filter
    function setupCategoryFilter() {
      const buttons = document.querySelectorAll('.category-filter button');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = btn.dataset.category;
          renderNews(newsData);
        });
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      fetchNews();
      setupCategoryFilter();
      resetCountdown();

      // Auto-refresh
      refreshInterval = setInterval(() => {
        fetchNews();
        resetCountdown();
      }, REFRESH_INTERVAL);
    });

    // Dark mode toggle
    (function() {
      const toggle = document.getElementById('darkModeToggle');
      const sunIcon = toggle?.querySelector('.sun-icon');
      const moonIcon = toggle?.querySelector('.moon-icon');

      const saved = localStorage.getItem('darkMode');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (saved === 'true' || (!saved && systemDark)) {
        document.documentElement.classList.add('dark-mode');
        if (sunIcon) sunIcon.style.display = 'none';
        if (moonIcon) moonIcon.style.display = 'block';
      }

      toggle?.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark-mode');
        const isDark = document.documentElement.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark.toString());
        if (sunIcon) sunIcon.style.display = isDark ? 'none' : 'block';
        if (moonIcon) moonIcon.style.display = isDark ? 'block' : 'none';
      });
    })();
  </script>
</body>
</html>
